# Render Blueprint — one-click deploy of the TakeOff.ai backend + Postgres.
#
#   Render → New → Blueprint → point at this repo → Apply.
#
# The service name `takeoff-api` gives the deterministic URL
# https://takeoff-api.onrender.com — which vercel.json already proxies /api to,
# so the frontend needs no extra config. Migrations create the postgis + vector
# extensions on first boot; SEED_ON_START loads the demo users.
databases:
  - name: takeoff-db
    databaseName: takeoff
    plan: free

services:
  - type: web
    name: takeoff-api
    runtime: docker
    dockerfilePath: app/backend/Dockerfile
    dockerContext: app/backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: takeoff-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true          # strong random secret (my auth fail-fast is satisfied)
      - key: ENVIRONMENT
        value: production
      - key: SEED_ON_START
        value: "true"                # creates alex@acme.com / password123 on first deploy
      - key: CORS_ORIGINS
        value: "https://take-off-omega.vercel.app"
